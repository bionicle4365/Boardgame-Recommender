<style>
    header {
        background-color: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        height: 70px;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-page-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text-main);
        margin: 0;
    }

    /* Modern clean toggle button */
    .header-toggle-button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 8px;
        cursor: pointer;
        font-size: 16px;
        border-radius: 8px;
        width: 38px;
        height: 38px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    .header-toggle-button .bar {
        width: 18px;
        height: 2px;
        background-color: var(--text-muted);
        border-radius: 1px;
        transition: all 0.2s ease;
    }

    .header-toggle-button:hover {
        background-color: rgba(0, 0, 0, 0.05);
        color: var(--text-main);
        border-color: var(--text-main);
    }
    
    .header-toggle-button:hover .bar {
        background-color: var(--text-main);
    }

    /* Auth Header Badge & Button Styles */
    .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-auth-button {
        background-color: var(--primary);
        color: #ffffff;
        border: none;
        padding: 8px 16px;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        border-radius: 8px;
        transition: background-color 0.2s ease;
        box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06);
    }

    .header-auth-button:hover {
        background-color: var(--primary-hover);
    }

    .header-user-badge {
        position: relative;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        color: var(--text-muted);
        background-color: #f1f5f9;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
    }

    .header-user-badge:hover {
        background-color: #e2e8f0;
        border-color: var(--primary);
    }

    .header-user-badge::after {
        content: "▼";
        font-size: 0.65rem;
        margin-left: 4px;
        color: var(--text-muted);
        transition: transform 0.2s ease;
    }

    .header-user-badge.open::after {
        transform: rotate(180deg);
    }

    .header-user-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        padding: 8px;
        min-width: 160px;
        flex-direction: column;
        gap: 4px;
        z-index: 1000;
        animation: slideUp 0.15s ease;
    }

    .header-user-badge.open .header-user-dropdown {
        display: flex;
    }

    .header-user-email {
        font-weight: 600;
        color: var(--text-main);
        max-width: 120px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .header-dropdown-item {
        padding: 8px 12px;
        color: var(--text-main);
        font-weight: 500;
        font-size: 0.85rem;
        text-decoration: none;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.15s ease;
        cursor: pointer;
    }

    .header-dropdown-item:hover {
        background-color: #f1f5f9;
        color: var(--primary);
    }

    .header-dropdown-divider {
        height: 1px;
        background-color: var(--border);
        margin: 4px 0;
    }

    /* Auth Modal Overlay and cards with glassmorphism */
    .auth-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        animation: fadeIn 0.2s ease;
    }

    .auth-modal-card {
        background-color: #ffffff;
        border-radius: 16px;
        padding: 30px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        position: relative;
        border: 1px solid var(--border);
        animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .auth-modal-close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        background: transparent;
        border: none;
        font-size: 1.5rem;
        color: var(--text-muted);
        cursor: pointer;
        transition: color 0.15s ease;
    }

    .auth-modal-close-btn:hover {
        color: var(--text-main);
    }

    .auth-title {
        font-size: 1.5rem;
        font-weight: 800;
        margin-top: 0;
        margin-bottom: 8px;
        color: var(--text-main);
        text-align: center;
    }

    .auth-subtitle {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
    }

    .auth-input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
        text-align: left;
    }

    .auth-input-group label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .auth-input-group input {
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 0.95rem;
        color: var(--text-main);
        outline: none;
        transition: border-color 0.15s ease;
    }

    .auth-input-group input:focus {
        border-color: var(--primary);
    }

    .auth-submit-btn {
        background-color: var(--primary);
        color: #ffffff;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 8px;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background-color 0.15s ease;
        margin-top: 10px;
    }

    .auth-submit-btn:hover {
        background-color: var(--primary-hover);
    }

    .auth-footer-text {
        font-size: 0.85rem;
        color: var(--text-muted);
        text-align: center;
        margin-top: 20px;
    }

    .auth-toggle-link {
        color: var(--primary);
        font-weight: 600;
        cursor: pointer;
    }

    .auth-toggle-link:hover {
        text-decoration: underline;
    }

    .auth-error-msg {
        background-color: #fef2f2;
        color: #ef4444;
        border: 1px solid #fca5a5;
        border-radius: 8px;
        padding: 10px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        font-weight: 500;
        text-align: left;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes slideUp {
        from { transform: translateY(15px); }
        to { transform: translateY(0); }
    }
</style>

<div class="header-left">
    <button id="sidebar-toggle" class="header-toggle-button">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>
    <h1 class="header-page-title">{{ page.title }}</h1>
</div>

<div class="header-right">
    <div id="auth-status-container">
        <!-- Will be dynamically populated by JS -->
        <button id="auth-login-btn" class="header-auth-button">Log In</button>
    </div>
</div>



<script>
    // Cognito configuration values compiled by Jekyll
    const COGNITO_CLIENT_ID = "{{ site.cognito_client_id }}";
    const COGNITO_REGION = "{{ site.cognito_region }}";

    // Authentication Helper Methods
    window.Auth = {
        isLoggedIn() {
            return !!localStorage.getItem("bgg_auth_id_token");
        },
        async getValidToken() {
            const idToken = localStorage.getItem("bgg_auth_id_token");
            const expiry = localStorage.getItem("bgg_auth_token_expiry");
            const refreshToken = localStorage.getItem("bgg_auth_refresh_token");
            
            if (!idToken || !refreshToken) return null;
            
            // Refresh token 5 minutes before expiry
            if (Date.now() > (parseInt(expiry) - 5 * 60 * 1000)) {
                try {
                    const res = await this.cognitoRequest("AWSCognitoIdentityProviderService.InitiateAuth", {
                        ClientId: COGNITO_CLIENT_ID,
                        AuthFlow: "REFRESH_TOKEN_AUTH",
                        AuthParameters: {
                            REFRESH_TOKEN: refreshToken
                        }
                    });
                    if (res.AuthenticationResult) {
                        const newId = res.AuthenticationResult.IdToken;
                        localStorage.setItem("bgg_auth_id_token", newId);
                        localStorage.setItem("bgg_auth_token_expiry", (Date.now() + 3600 * 1000).toString());
                        return newId;
                    }
                } catch (e) {
                    console.error("Token refresh failed:", e);
                    this.logout();
                    return null;
                }
            }
            return idToken;
        },
        getEmail() {
            return localStorage.getItem("bgg_auth_email");
        },
        logout() {
            localStorage.removeItem("bgg_auth_id_token");
            localStorage.removeItem("bgg_auth_refresh_token");
            localStorage.removeItem("bgg_auth_email");
            localStorage.removeItem("bgg_auth_token_expiry");
            window.location.reload();
        },
        async cognitoRequest(target, payload) {
            const url = `https://cognito-idp.${COGNITO_REGION}.amazonaws.com/`;
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-amz-json-1.1",
                    "X-Amz-Target": target
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.message || "Cognito request failed");
            }
            return data;
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
        // Elements for Sidebar
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const backdrop = document.getElementById('sidebar-backdrop');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                if (window.innerWidth <= 768) {
                    document.body.classList.toggle('sidebar-open');
                    document.body.classList.remove('sidebar-collapsed');
                } else {
                    document.body.classList.toggle('sidebar-collapsed');
                    document.body.classList.remove('sidebar-open');
                }
            });
        }

        if (backdrop) {
            backdrop.addEventListener('click', function() {
                document.body.classList.remove('sidebar-open');
            });
        }

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                document.body.classList.remove('sidebar-open');
            }
        });

        // Cognito Modal & Forms Bindings
        const authStatusContainer = document.getElementById("auth-status-container");
        const authModal = document.getElementById("auth-modal");
        const authModalClose = document.getElementById("auth-modal-close");
        
        const loginBtn = document.getElementById("auth-login-btn");
        
        const viewLogin = document.getElementById("auth-view-login");
        const viewSignUp = document.getElementById("auth-view-signup");
        const viewConfirm = document.getElementById("auth-view-confirm");
        
        const loginForm = document.getElementById("auth-login-form");
        const signUpForm = document.getElementById("auth-signup-form");
        const confirmForm = document.getElementById("auth-confirm-form");
        
        const loginError = document.getElementById("login-error-msg");
        const signUpError = document.getElementById("signup-error-msg");
        const confirmError = document.getElementById("confirm-error-msg");
        
        const goToSignUp = document.getElementById("go-to-signup");
        const goToLogin = document.getElementById("go-to-login");
        const confirmInstruction = document.getElementById("confirm-instruction");
        const resendCodeBtn = document.getElementById("resend-code-btn");

        let activeEmail = "";

        window.toggleHeaderDropdown = function(event) {
            event.stopPropagation();
            const badge = document.getElementById("header-user-badge-btn");
            if (badge) {
                badge.classList.toggle("open");
            }
        };

        document.addEventListener("click", function() {
            const badge = document.getElementById("header-user-badge-btn");
            if (badge) {
                badge.classList.remove("open");
            }
        });

        // Render Authentication Status Header Badge
        function renderAuthHeader() {
            if (Auth.isLoggedIn()) {
                const email = Auth.getEmail() || "User";
                authStatusContainer.innerHTML = `
                    <div class="header-user-badge" id="header-user-badge-btn" onclick="toggleHeaderDropdown(event)">
                        <span>Welcome,</span>
                        <span class="header-user-email" title="${email}">${email}</span>
                        <div class="header-user-dropdown" id="header-user-dropdown">
                            <a class="header-dropdown-item" href="/Boardgame-Recommender/profile/">👤 View Profile</a>
                            <a class="header-dropdown-item" href="/Boardgame-Recommender/settings/">⚙️ Settings</a>
                            <div class="header-dropdown-divider"></div>
                            <div class="header-dropdown-item" onclick="event.stopPropagation(); Auth.logout()">🚪 Log Out</div>
                        </div>
                    </div>
                `;
            } else {
                authStatusContainer.innerHTML = `
                    <button id="auth-login-btn" class="header-auth-button">Log In</button>
                `;
                // Rebind event listener
                document.getElementById("auth-login-btn").addEventListener("click", openModal);
            }
        }

        function openModal() {
            if (!COGNITO_CLIENT_ID) {
                alert("Cognito Client ID is not configured in _config.yml yet. Please deploy Cognito and update the config.");
                return;
            }
            authModal.style.display = "flex";
            document.body.style.overflow = "hidden"; // Prevent background scroll
            showLoginView();
        }

        function closeModal() {
            authModal.style.display = "none";
            document.body.style.overflow = ""; // Restore background scroll
            clearErrors();
        }

        function clearErrors() {
            loginError.style.display = "none";
            signUpError.style.display = "none";
            confirmError.style.display = "none";
        }

        function showLoginView() {
            viewLogin.style.display = "block";
            viewSignUp.style.display = "none";
            viewConfirm.style.display = "none";
            clearErrors();
        }

        function showSignUpView() {
            viewLogin.style.display = "none";
            viewSignUp.style.display = "block";
            viewConfirm.style.display = "none";
            clearErrors();
        }

        function showConfirmView(email) {
            activeEmail = email;
            confirmInstruction.innerHTML = `We sent a verification code to <strong>${email}</strong>.`;
            viewLogin.style.display = "none";
            viewSignUp.style.display = "none";
            viewConfirm.style.display = "block";
            clearErrors();
        }

        if (loginBtn) loginBtn.addEventListener("click", openModal);
        if (authModalClose) authModalClose.addEventListener("click", closeModal);
        if (goToSignUp) goToSignUp.addEventListener("click", showSignUpView);
        if (goToLogin) goToLogin.addEventListener("click", showLoginView);
        
        // Handle login modal dismissal on background click
        authModal.addEventListener("click", function(e) {
            if (e.target === authModal) closeModal();
        });

        // 1. Submit Login Form
        loginForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            loginError.style.display = "none";
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;

            try {
                const data = await Auth.cognitoRequest("AWSCognitoIdentityProviderService.InitiateAuth", {
                    ClientId: COGNITO_CLIENT_ID,
                    AuthFlow: "USER_PASSWORD_AUTH",
                    AuthParameters: {
                        USERNAME: email,
                        PASSWORD: password
                    }
                });

                if (data.AuthenticationResult) {
                    localStorage.setItem("bgg_auth_id_token", data.AuthenticationResult.IdToken);
                    localStorage.setItem("bgg_auth_refresh_token", data.AuthenticationResult.RefreshToken);
                    localStorage.setItem("bgg_auth_email", email);
                    localStorage.setItem("bgg_auth_token_expiry", (Date.now() + 3600 * 1000).toString());
                    
                    closeModal();
                    
                    // Dispatch login success event so other scripts can sync data
                    document.dispatchEvent(new CustomEvent("bgg_login_success"));
                    renderAuthHeader();
                    window.location.reload();
                }
            } catch (err) {
                console.error("Login failed:", err);
                if (err.message === "User is not confirmed.") {
                    showConfirmView(email);
                } else {
                    loginError.textContent = err.message || "Failed to log in. Please try again.";
                    loginError.style.display = "block";
                }
            }
        });

        // 2. Submit Sign Up Form
        signUpForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            signUpError.style.display = "none";
            const email = document.getElementById("signup-email").value.trim();
            const password = document.getElementById("signup-password").value;
            const confirmPassword = document.getElementById("signup-confirm-password").value;

            if (password !== confirmPassword) {
                signUpError.textContent = "Passwords do not match!";
                signUpError.style.display = "block";
                return;
            }

            try {
                await Auth.cognitoRequest("AWSCognitoIdentityProviderService.SignUp", {
                    ClientId: COGNITO_CLIENT_ID,
                    Username: email,
                    Password: password,
                    UserAttributes: [
                        { Name: "email", Value: email }
                    ]
                });
                showConfirmView(email);
            } catch (err) {
                console.error("Sign up failed:", err);
                signUpError.textContent = err.message || "Registration failed. Please try again.";
                signUpError.style.display = "block";
            }
        });

        // 3. Submit Code Verification Form
        confirmForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            confirmError.style.display = "none";
            const code = document.getElementById("confirm-code").value.trim();

            try {
                await Auth.cognitoRequest("AWSCognitoIdentityProviderService.ConfirmSignUp", {
                    ClientId: COGNITO_CLIENT_ID,
                    Username: activeEmail,
                    ConfirmationCode: code
                });
                alert("Account verified successfully! You can now log in.");
                showLoginView();
            } catch (err) {
                console.error("Confirmation failed:", err);
                confirmError.textContent = err.message || "Verification code is incorrect.";
                confirmError.style.display = "block";
            }
        });

        // 4. Resend Verification Code
        if (resendCodeBtn) {
            resendCodeBtn.addEventListener("click", async function() {
                confirmError.style.display = "none";
                try {
                    await Auth.cognitoRequest("AWSCognitoIdentityProviderService.ResendConfirmationCode", {
                        ClientId: COGNITO_CLIENT_ID,
                        Username: activeEmail
                    });
                    alert("A new verification code has been sent!");
                } catch (err) {
                    console.error("Resend code failed:", err);
                    confirmError.textContent = err.message || "Failed to resend code.";
                    confirmError.style.display = "block";
                }
            });
        }

        // Initialize header auth badge state
        renderAuthHeader();
    });
</script>
