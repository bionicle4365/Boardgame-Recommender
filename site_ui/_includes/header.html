<style>
    header {
        background-color: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        height: 70px;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-page-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text-main);
        margin: 0;
    }

    /* Modern clean toggle button */
    .header-toggle-button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 8px;
        cursor: pointer;
        font-size: 16px;
        border-radius: 8px;
        width: 38px;
        height: 38px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    .header-toggle-button .bar {
        width: 18px;
        height: 2px;
        background-color: var(--text-muted);
        border-radius: 1px;
        transition: all 0.2s ease;
    }

    .header-toggle-button:hover {
        background-color: rgba(0, 0, 0, 0.05);
        color: var(--text-main);
        border-color: var(--text-main);
    }
    
    .header-toggle-button:hover .bar {
        background-color: var(--text-main);
    }
</style>

<div class="header-left">
    <button id="sidebar-toggle" class="header-toggle-button">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>
    <h1 class="header-page-title">{{ page.title }}</h1>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarContainer = parent.document.getElementById('sidebar-container');
        const mainWrapper = document.getElementById('main-wrapper');

        const adjustContentMargin = () => {
            if (sidebarContainer.classList.contains('collapsed')) {
                mainWrapper.style.marginLeft = '0px';
                sidebarContainer.style.width = '0px';
            } else {
                mainWrapper.style.marginLeft = '260px';
                sidebarContainer.style.width = '260px';
            }
        };

        // Initial adjustment
        adjustContentMargin();

        // Observe changes to the sidebar-container's class list
        const observer = new MutationObserver(adjustContentMargin);
        observer.observe(sidebarContainer, { attributes: true, attributeFilter: ['class'] });

        // Toggle sidebar on button click
        sidebarToggle.addEventListener('click', function() {
            sidebarContainer.classList.toggle('collapsed');
        });
    });
</script>
