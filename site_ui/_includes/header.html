<style>
    header {
        background-color: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        height: 70px;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-page-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text-main);
        margin: 0;
    }

    /* Modern clean toggle button */
    .header-toggle-button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 8px;
        cursor: pointer;
        font-size: 16px;
        border-radius: 8px;
        width: 38px;
        height: 38px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    .header-toggle-button .bar {
        width: 18px;
        height: 2px;
        background-color: var(--text-muted);
        border-radius: 1px;
        transition: all 0.2s ease;
    }

    .header-toggle-button:hover {
        background-color: rgba(0, 0, 0, 0.05);
        color: var(--text-main);
        border-color: var(--text-main);
    }
    
    .header-toggle-button:hover .bar {
        background-color: var(--text-main);
    }
</style>

<div class="header-left">
    <button id="sidebar-toggle" class="header-toggle-button">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>
    <h1 class="header-page-title">{{ page.title }}</h1>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const backdrop = document.getElementById('sidebar-backdrop');

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                if (window.innerWidth <= 768) {
                    document.body.classList.toggle('sidebar-open');
                    document.body.classList.remove('sidebar-collapsed');
                } else {
                    document.body.classList.toggle('sidebar-collapsed');
                    document.body.classList.remove('sidebar-open');
                }
            });
        }

        if (backdrop) {
            backdrop.addEventListener('click', function() {
                document.body.classList.remove('sidebar-open');
            });
        }

        // Close mobile sidebar overlay if resized back to desktop
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                document.body.classList.remove('sidebar-open');
            }
        });
    });
</script>
