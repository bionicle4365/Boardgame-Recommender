<style>
    :root {
        --primary-green: #10b981;
        --primary-green-hover: #059669;
        --primary-green-glow: rgba(16, 185, 129, 0.15);
    }

    #bgg-form {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 16px;
        padding: 20px 24px;
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 100%;
        margin: 24px 0 32px 0;
        background-color: var(--card-bg);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
    }

    #bgg-form label {
        font-weight: 700;
        font-size: 0.85rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
        margin-right: 4px;
    }

    #bgg-form input[type="text"] {
        height: 44px;
        padding: 0 16px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        flex-grow: 1;
        min-width: 0;
        box-sizing: border-box;
        font-size: 0.95rem;
        transition: all 0.2s ease;
        background-color: var(--input-bg);
        color: var(--text-main);
    }

    #bgg-form input[type="text"]:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 3px var(--primary-green-glow);
        background-color: var(--input-focus-bg);
    }

    #bgg-form button[type="submit"] {
        height: 44px;
        background-color: var(--primary-green);
        color: white;
        padding: 0 28px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        white-space: nowrap;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #bgg-form button[type="submit"]:hover {
        background-color: var(--primary-green-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(16, 185, 129, 0.3);
    }

    #bgg-form button[type="submit"]:active {
        transform: translateY(0);
    }

    @media (max-width: 640px) {
        #bgg-form {
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            padding: 20px;
        }

        #bgg-form label {
            margin-right: 0;
            margin-bottom: 4px;
        }

        #bgg-form input[type="text"] {
            width: 100%;
        }

        #bgg-form button[type="submit"] {
            width: 100%;
        }
    }
</style>

<form id="bgg-form">
    <label for="bgg_username">BGG Username</label>
    <input type="text" id="bgg_username" name="bgg_username" placeholder="e.g. bionicle4365" required>
    <button type="submit">Load Collection</button>
</form>
