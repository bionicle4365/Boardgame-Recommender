name: Python Unit Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - "bgg_recommender/**"
      - "bgg_compactor/**"
      - "bgg_game_data_scraper/**"
      - "bgg_game_scraper/**"
      - "bgg_user_data_scraper/**"
      - "tests/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "bgg_recommender/**"
      - "bgg_compactor/**"
      - "bgg_game_data_scraper/**"
      - "bgg_game_scraper/**"
      - "bgg_user_data_scraper/**"
      - "tests/**"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy requests pyarrow boto3 botocore

    - name: Run Pytest
      run: |
        python -m pytest tests/ -v
