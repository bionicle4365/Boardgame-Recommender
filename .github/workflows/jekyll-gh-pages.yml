# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - site_ui/**
      - ".github/workflows/jekyll-gh-pages.yml"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Inject Production Configurations
        run: |
          sed -i 's|api_url: "PLACEHOLDER_API_URL"|api_url: "${{ secrets.PROD_API_URL }}"|g' site_ui/_config.yml
          sed -i 's|cognito_client_id: "PLACEHOLDER_COGNITO_CLIENT_ID"|cognito_client_id: "${{ secrets.PROD_COGNITO_CLIENT_ID }}"|g' site_ui/_config.yml
          sed -i 's|cognito_user_pool_id: "PLACEHOLDER_COGNITO_USER_POOL_ID"|cognito_user_pool_id: "${{ secrets.PROD_COGNITO_USER_POOL_ID }}"|g' site_ui/_config.yml
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site_ui
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
