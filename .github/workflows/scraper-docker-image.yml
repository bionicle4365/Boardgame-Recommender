name: BGG Game Scraper Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - bgg_game_scraper/**
      - ".github/workflows/scraper-docker-image.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - bgg_game_scraper/**
      - ".github/workflows/scraper-docker-image.yml"
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY}}
  AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
  AWS_REGION: "us-east-1"

jobs:
  build_and_push_docker_image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Get ECR URL
      run: |
        ECR_URL=$(aws ssm get-parameter --name /bgg/ecr/bgg_game_scraper_repository_url --query Parameter.Value --output text)
        if [ -z "$ECR_URL" ]; then
          echo "ERROR: ECR_URL is empty. Please verify that the SSM parameter exists and that your GitHub Actions IAM policy has 'ssm:GetParameter' permission."
          exit 1
        fi
        echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV
    - name: Push the Docker image to ECR
      run: |
        docker build . --file Dockerfile --tag bgg_scraper:${{ github.run_number }}
        aws ecr get-login-password | docker login --username AWS --password-stdin ${ECR_URL}
        docker tag bgg_scraper:${{ github.run_number }} ${ECR_URL}:latest
        docker push ${ECR_URL}:latest
      working-directory: ./bgg_game_scraper

