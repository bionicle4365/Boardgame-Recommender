name: BGG Taste Analytics Worker Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - bgg_taste_analytics/**
      - ".github/workflows/taste-analytics-docker-image.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - bgg_taste_analytics/**
      - ".github/workflows/taste-analytics-docker-image.yml"
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: "us-east-1"

jobs:
  build_and_push_docker_image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Get ECR URL
      run: |
        ECR_URL=$(aws ssm get-parameter --name /bgg/ecr/bgg_taste_analytics_repository_url --query Parameter.Value --output text)
        if [ -z "$ECR_URL" ]; then
          echo "ERROR: ECR_URL is empty. Please verify that the SSM parameter exists."
          exit 1
        fi
        echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV
    - name: Log in to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build, tag, and push image to Amazon ECR
      run: |
        docker build . --file Dockerfile --tag $ECR_URL:${{ github.run_number }}
        docker tag $ECR_URL:${{ github.run_number }} $ECR_URL:latest
        docker push $ECR_URL:latest
      working-directory: ./bgg_taste_analytics
  deploy_lambda:
    needs: build_and_push_docker_image
    runs-on: ubuntu-latest
    steps:
    - name: Get ECR URL
      run: |
        ECR_URL=$(aws ssm get-parameter --name /bgg/ecr/bgg_taste_analytics_repository_url --query Parameter.Value --output text)
        if [ -z "$ECR_URL" ]; then
          echo "ERROR: ECR_URL is empty. Please verify that the SSM parameter exists."
          exit 1
        fi
        echo "ECR_URL=$ECR_URL" >> $GITHUB_ENV
    - name: Deploy Lambda Functions
      run: |
        if aws lambda get-function --function-name bgg_taste_analytics >/dev/null 2>&1; then
          echo "Updating bgg_taste_analytics code..."
          aws lambda update-function-code --function-name bgg_taste_analytics --image-uri ${ECR_URL}:latest
        fi
